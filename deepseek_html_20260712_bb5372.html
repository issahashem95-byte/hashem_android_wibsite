<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة التحكم · Hashim Android</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <style>
        .admin-container {
            padding: 24px 0;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 32px;
        }
        .admin-header h1 {
            font-size: 2rem;
            font-weight: 800;
        }
        .admin-actions-header {
            display: flex;
            gap: 12px;
        }
        .admin-table-wrap {
            overflow-x: auto;
            margin-top: 24px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            background: rgba(46, 213, 115, 0.15);
            color: #2ed573;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="container">
        <header class="header">
            <a href="../index.html" class="logo-group">
                <span class="logo-icon">⌘</span>
                <span class="logo-text">Hashim<span>Android</span></span>
            </a>
            <div class="header-actions">
                <span style="color: var(--text-secondary); font-size:0.9rem;">
                    <i class="fas fa-user-shield"></i> Admin
                </span>
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>
    </div>

    <!-- ADMIN DASHBOARD -->
    <div class="container admin-container">
        <div class="admin-header">
            <h1>📊 لوحة التحكم</h1>
            <div class="admin-actions-header">
                <a href="add-app.html" class="btn btn-primary" style="padding:10px 20px; font-size:0.9rem;">
                    <i class="fas fa-plus"></i> إضافة تطبيق
                </a>
                <a href="../index.html" class="btn btn-outline" style="padding:10px 20px; font-size:0.9rem;">
                    <i class="fas fa-eye"></i> عرض الموقع
                </a>
            </div>
        </div>

        <!-- Stats -->
        <div class="admin-stats"></div>

        <!-- Apps Table -->
        <div style="margin-top: 40px;">
            <h3 style="margin-bottom:16px;">📱 جميع التطبيقات</h3>
            <div class="admin-table-wrap glass-sm" style="padding: 4px;">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>التطبيق</th>
                            <th>الإصدار</th>
                            <th>التحميلات</th>
                            <th>مميز</th>
                            <th>الحالة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../assets/js/admin.js"></script>
</body>
</html>
